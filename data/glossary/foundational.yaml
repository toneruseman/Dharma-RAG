# `balanced effort` and `right effort` are *different* concepts:
# balanced effort = sona sutta lute simile (AN 6.55, about
# not-too-tight / not-too-slack); right effort (sammā-vāyāma) = the
# 6th factor of the Noble Eightfold Path, taught in MN 117 / AN 4.13.
# Earlier rag-day-28 entry overlapped them — fixed in rag-day-32.
- term: balanced effort
  aliases:
    - sona
    - sona sutta
    - средние усилия
    - lute simile
  works: [an6.55]
  boost: 1.5

