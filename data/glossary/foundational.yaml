# Curated foundational mapping (rag-day-28).
#
# Source: Sahaya (buddhistcompanion.com) 12 essential suttas + selected
# topical guides + MN 10 "If this landed" cross-refs, supplemented with
# six high-frequency definitional terms from QA040_INVESTIGATION
# (vipassana, jhana, right view, kamma, nibbana, five precepts).
#
# Used by `src/expand/foundational.py` to detect when a user query
# names a canonical Buddhist term and to apply a post-RRF boost on
# the foundational sutta(s) for that term, lifting them above
# derivative texts that share the term's surface form.
#
# Why per-entry boost varies: 1.5 for single-sutta canonical
# first-source (e.g. SN 56.11 for the Four Noble Truths); 1.4 for
# multi-work or supplementary terms where the boost should not
# fully dominate organic ranking.
#
# Curation backlog (B-001, buddhologist): expand to 30-50 pairs,
# verify aliases for Russian translations, add edge cases (e.g.
# saṃyojana, indriya, bojjhaṅga). See docs/concepts/28-definitional-expansion.md.

