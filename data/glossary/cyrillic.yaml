# Кириллические транслитерации палийских терминов.
#
# Что это и зачем:
#   DPD (Digital Pāḷi Dictionary) даёт переводы Pali → EN/RU, но не
#   содержит написания палийских слов кириллицей. Российские буддисты
#   пишут «джхана», «дуккха», «нирвана» — эти варианты не находятся в
#   DPD по lemma, и без этого слоя query-expansion не сработает на
#   русскоязычных запросах.
#
# Структура:
#   - pali: каноническая палийская lemma (та же что в DPD)
#     cyrillic: список написаний кириллицей. Включаем:
#       - прямые транслитерации (jhāna → джхана)
#       - принятые в русском буддизме формы из санскрита
#         (kamma/Pali → карма/санскрит; dhamma → дхарма)
#       - частые альтернативные написания (бхикку / бхиккху)
#
# Что НЕ включаем:
#   - переводы значений (страдание для dukkha, мудрость для paññā) —
#     это уже есть в DPD как meanings_ru.
#   - редкие/учёные транслитерации, которые пользователи не наберут.
#
# Источники:
#   - Ньянатилока «Словарь буддийских терминов» (русский перевод)
#   - theravada.ru / dhamma.ru глоссарии
#   - устоявшиеся написания в русскоязычной литературе
#
# Объём rag-day-23: ~180 терминов high-freq core. Для Phase 3 план
# расширить до 500-2000 (см. project plan).

