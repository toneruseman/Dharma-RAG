# Deploy to production
#
# DISABLED until Phase 4 (day 50-56) when the Hetzner VPS is provisioned.
# The original on-push trigger was failing every commit since v0.1.0 with
# `repository name must be lowercase` (ghcr.io rejects the uppercase
# `Dharma-RAG` segment) and the deploy job has no `HETZNER_HOST` secret
# anyway. Keeping the file as a recipe for the day we flip it back on;
# the only trigger now is manual (workflow_dispatch). When ready, fix
# the lowercase tag and add the secrets, then add `push:` back.

name: Deploy to Production

on:
  workflow_dispatch:  # manual trigger only — see header comment

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: dharma
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /home/dharma/dharma-rag
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-deps app
            docker image prune -f

      - name: Smoke test
        run: |
          sleep 15
          curl --fail https://dharma-rag.org/api/health || exit 1

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment succeeded for ${{ github.sha }}"

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: dharma
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /home/dharma/dharma-rag
            docker compose -f docker-compose.prod.yml rollback app || \
                docker compose -f docker-compose.prod.yml up -d --no-deps app
