# .pre-commit-config.yaml
repos:
  # Базовые проверки
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
        # data/glossary/dpd_full.json (~10 MB) is the parsed Pāli
        # glossary derived from ms-dpd (rag-day-23). It IS committed
        # because runtime needs it and we control its contents (rebuild
        # via scripts/build_dpd_glossary.py). Other large files should
        # still be caught by the default 1 MB cap.
        exclude: |
          (?x)^(
            data/glossary/dpd_full\.json
          )$
      - id: check-merge-conflict
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Ruff — линтер и форматтер
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # MyPy — проверка типов (опционально, медленно)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - pydantic-settings
          - types-PyYAML
          - fastapi
          - structlog
          - sqlalchemy>=2.0.35
        files: ^src/

  # Блокировать секреты (API keys)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        # Lockfiles contain cryptographic content hashes (SHA-512 base64)
        # that detect-secrets flags as Base64-high-entropy. They are not
        # secrets — they are reproducible-build attestations. The other
        # hooks in this file still scan source code as before.
        exclude: |
          (?x)^(
            package\.lock\.json
            |pnpm-lock\.yaml
            |web/pnpm-lock\.yaml
          )$
