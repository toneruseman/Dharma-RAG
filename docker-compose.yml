services:
  # ========================================================================
  # Dharma DB — Postgres for FRBR corpus + app tables
  # ========================================================================
  dharma-db:
    image: postgres:16-alpine
    container_name: dharma-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dharma
      POSTGRES_USER: dharma
      POSTGRES_PASSWORD: ${DHARMA_DB_PASSWORD:-dharma_dev}
    volumes:
      - dharma_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dharma -d dharma"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========================================================================
  # Qdrant — Vector Database
  # ========================================================================
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: dharma-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================================================================
  # Langfuse — LLM Observability
  # ========================================================================
  langfuse-db:
    image: postgres:16-alpine
    container_name: dharma-langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-changeme}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: dharma-langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-changeme}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-32-char-string-for-secret}
      SALT: ${LANGFUSE_SALT:-changeme-salt-string}
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

  # ========================================================================
  # Phoenix — OpenTelemetry + OpenInference observability (ADR-0001)
  #
  # Lighter than Langfuse: single container, SQLite persistence, OTel-native.
  # The FastAPI app exports traces to :4317 (gRPC); operators view them in
  # the web UI at http://localhost:6006. Langfuse stays running alongside
  # during the v0.0.x migration window and will be removed in v0.1.0.
  # ========================================================================
  phoenix:
    image: arizephoenix/phoenix:version-14.10
    container_name: dharma-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"  # Web UI (dashboard)
      - "4317:4317"  # OTLP/gRPC ingest (app sends spans here)
    environment:
      # Persist traces to /mnt/data so they survive container restarts.
      # Using the built-in SQLite backend — no extra DB service needed.
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenix_data:/mnt/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6006/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ========================================================================
  # FastAPI app (uncomment when ready)
  # ========================================================================
  # app:
  #   build: .
  #   container_name: dharma-app
  #   restart: unless-stopped
  #   depends_on:
  #     qdrant:
  #       condition: service_healthy
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     QDRANT_URL: http://qdrant:6333
  #     LANGFUSE_HOST: http://langfuse:3000
  #   env_file:
  #     - .env
  #   volumes:
  #     - ./src:/app/src
  #     - ./data:/app/data

volumes:
  qdrant_storage:
  langfuse_db_data:
  dharma_db_data:
  phoenix_data:
