# Alembic config for Dharma-RAG.
#
# The database URL is supplied at runtime by ``alembic/env.py`` from
# ``src.config.Settings`` — we intentionally leave ``sqlalchemy.url``
# blank here so the secret never lands in the repo.

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os
timezone = UTC
# Filename template for new revisions: rev<rev>_<slug>.py gives us
# chronological sorting regardless of the random revision hash.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

sqlalchemy.url =

[post_write_hooks]
# Migration files are formatted by the pre-commit ruff hook when the
# file is staged. We do not run ruff here because the entrypoint is
# environment-dependent on Windows.
hooks =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
